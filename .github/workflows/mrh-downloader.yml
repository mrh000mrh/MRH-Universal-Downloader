name: MRH Ultimate Downloader

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      # 1. کلون کردن ریپو
      - uses: actions/checkout@v4

      # 2. راه‌اندازی محیط برای یوتیوب و اینستاگرام (بهترین روش موجود)
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      # 3. دریافت دستور
      - name: Get Command
        id: cmd
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "message=$MSG" >> $GITHUB_OUTPUT

      # 4. دانلود خودکار (smrt!)
      - name: Smart Download
        run: |
          MSG="${{ steps.cmd.outputs.message }}"
          echo "Full message: $MSG"

          # تشخیص دستور یوتیوب
          if [[ "$MSG" == dl-yt:* ]]; then
            URL=$(echo "$MSG" | cut -d' ' -f2)
            echo "Downloading YouTube: $URL"
            mkdir -p downloads/youtube
            cd downloads/youtube
            yt-dlp -f "worst[ext=mp4]" "$URL" || yt-dlp -x --audio-format mp3 "$URL"
            cd ../..
          fi

          # تشخیص دستور اینستاگرام
          if [[ "$MSG" == dl-ig:* ]]; then
            URL=$(echo "$MSG" | cut -d' ' -f2)
            echo "Downloading Instagram: $URL"
            mkdir -p downloads/instagram
            cd downloads/instagram
            yt-dlp "$URL"
            cd ../..
          fi

          # تشخیص لینک مستقیم یا گیت‌هاب
          if [[ "$MSG" == dl:* ]] || [[ "$MSG" == dl-gh:* ]]; then
            URL=$(echo "$MSG" | cut -d' ' -f2)
            FILENAME=$(basename "$URL")
            echo "Downloading: $FILENAME from $URL"
            mkdir -p downloads/direct
            cd downloads/direct
            curl -L -O --retry 5 "$URL"
            cd ../..
          fi

      # 5. نمایش و Commit نهایی
      - name: Commit Files
        run: |
          git config user.name "MRH Ultimate Bot"
          git config user.email "mrh-bot@users.noreply.github.com"

          if [ -d downloads ] && [ "$(ls -A downloads)" ]; then
            git add downloads/
            git commit -m "MRH: Add downloaded files [skip ci]"
            git push
            echo "✅ Success! Check the 'downloads' folder."
          else
            echo "⚠️ No files were downloaded."
          fi
